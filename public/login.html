<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeluu - Parent Login</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card card">
      <div class="text-center">
        <a href="/" class="nav-brand" style="text-decoration:none; display:flex; align-items:center; justify-content:center; gap:10px;">
          <div class="zeluu-mascot">
            <div class="z-antenna"></div>
            <div class="z-eyes"><div class="z-eye"></div><div class="z-eye"></div></div>
          </div>
          <span class="zeluu-brand-text">Zeluu</span>
          <span class="zeluu-beta">Beta</span>
        </a>
        <h1 class="mt-4" id="auth-title">Welcome back</h1>
        <p id="auth-subtitle">Sign in to manage your child's learning</p>
      </div>

      <!-- Selected plan badge (shown when coming from pricing page) -->
      <div id="selected-plan-badge" style="display:none; margin-bottom:16px; padding:12px 16px; background:linear-gradient(135deg,#EEF2FF,#F0F9FF); border:2px solid #E0E7FF; border-radius:12px; text-align:center;">
        <div style="font-size:12px; color:#6366F1; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px;">Selected Plan</div>
        <div style="font-size:18px; font-weight:800; color:#0F172A;" id="selected-plan-name">--</div>
        <div style="font-size:13px; color:#64748B; margin-top:2px;" id="selected-plan-details">--</div>
        <div style="font-size:12px; color:#10B981; font-weight:600; margin-top:6px;">&#10003; 14-day free trial &bull; 10 free credits</div>
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">Sign In</div>
        <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
      </div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Your password" required>
        </div>
        <div id="login-error" class="form-error"></div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;" id="login-btn">Sign In</button>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" style="display:none;" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="signup-phone">Phone Number</label>
          <input type="tel" id="signup-phone" placeholder="+971 50 123 4567" required>
          <span style="font-size:11px; color:var(--gray-500);">We'll use this for account security and important updates only.</span>
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Min 6 characters" minlength="6" required>
        </div>
        <div id="signup-error" class="form-error"></div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;" id="signup-btn">Create Account</button>
        <p class="text-center mt-2" style="font-size:13px; color:var(--gray-500);">You'll get 10 free credits to start</p>
      </form>

      <div style="margin-top:24px; padding-top:24px; border-top:1px solid var(--gray-200); font-size:13px;">
        <span style="color:var(--gray-500);">Is your child looking to log in?</span><br>
        <a href="/child-login.html" style="color:var(--primary); text-decoration:none; font-weight:600;">Go to Student Login</a>
      </div>
    </div>
  </div>

  <script src="/js/supabase-config.js"></script>
  <script>
    // ---- PLAN PARAMETER HANDLING ----
    const PLAN_INFO = {
      starter_monthly:  { name: 'Starter',  credits: '60 credits/mo',  price: '$12/mo' },
      starter_annual:   { name: 'Starter',  credits: '60 credits/mo',  price: '$9.60/mo (billed yearly)' },
      standard_monthly: { name: 'Standard', credits: '120 credits/mo', price: '$18/mo' },
      standard_annual:  { name: 'Standard', credits: '120 credits/mo', price: '$14.40/mo (billed yearly)' },
      premium_monthly:  { name: 'Premium',  credits: '300 credits/mo', price: '$30/mo' },
      premium_annual:   { name: 'Premium',  credits: '300 credits/mo', price: '$24/mo (billed yearly)' },
      family_monthly:   { name: 'Family',   credits: '1,000 credits/mo', price: '$85/mo' },
      family_annual:    { name: 'Family',   credits: '1,000 credits/mo', price: '$68/mo (billed yearly)' },
    };

    const urlParams = new URLSearchParams(window.location.search);
    const selectedPlanId = urlParams.get('plan');

    // Show selected plan badge and auto-switch to signup if plan param exists
    if (selectedPlanId && PLAN_INFO[selectedPlanId]) {
      const plan = PLAN_INFO[selectedPlanId];
      document.getElementById('selected-plan-badge').style.display = 'block';
      document.getElementById('selected-plan-name').textContent = plan.name;
      document.getElementById('selected-plan-details').textContent = plan.credits + ' \u2014 ' + plan.price;
      // Auto-switch to signup tab for new customers
      setTimeout(() => switchTab('signup'), 100);
    }

    // Check if already logged in
    (async () => {
      const session = await getSession();
      if (session) {
        // If they came with a plan, redirect to checkout first
        if (selectedPlanId) {
          try {
            const data = await apiCall('/api/credits/checkout', {
              method: 'POST',
              body: JSON.stringify({ plan_id: selectedPlanId })
            });
            if (data && data.url) {
              window.location.href = data.url;
              return;
            }
          } catch (e) {}
        }
        window.location.href = '/dashboard.html';
      }
    })();

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('login-form').style.display = 'block';
        document.getElementById('signup-form').style.display = 'none';
        document.getElementById('auth-title').textContent = 'Welcome back';
        document.getElementById('auth-subtitle').textContent = "Sign in to manage your child's learning";
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('signup-form').style.display = 'block';
        document.getElementById('auth-title').textContent = selectedPlanId ? 'Sign up to start your trial' : 'Create account';
        document.getElementById('auth-subtitle').textContent = selectedPlanId
          ? 'Create your account to activate your 14-day free trial with 10 credits.'
          : 'Start with 10 free credits. No card required.';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('login-error');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
      errorEl.style.display = 'none';

      const { data, error } = await window.supabaseClient.auth.signInWithPassword({
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value,
      });

      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Sign In';
      } else {
        // If they came with a plan from pricing page, redirect to checkout
        if (selectedPlanId) {
          try {
            const checkoutData = await apiCall('/api/credits/checkout', {
              method: 'POST',
              body: JSON.stringify({ plan_id: selectedPlanId })
            });
            if (checkoutData && checkoutData.url) {
              window.location.href = checkoutData.url;
              return;
            }
          } catch (e) {}
        }
        window.location.href = '/dashboard.html';
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      const errorEl = document.getElementById('signup-error');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
      errorEl.style.display = 'none';

      const phone = document.getElementById('signup-phone').value.trim();

      const { data, error } = await window.supabaseClient.auth.signUp({
        email: document.getElementById('signup-email').value,
        password: document.getElementById('signup-password').value,
        options: {
          data: {
            full_name: document.getElementById('signup-name').value,
            phone: phone
          }
        }
      });

      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Create Account';
      } else {
        // If they chose a plan from pricing page, redirect to checkout
        if (selectedPlanId) {
          try {
            const checkoutData = await apiCall('/api/credits/checkout', {
              method: 'POST',
              body: JSON.stringify({ plan_id: selectedPlanId })
            });
            if (checkoutData && checkoutData.url) {
              window.location.href = checkoutData.url;
              return;
            }
          } catch (e) {
            // Fallback to dashboard if checkout fails
          }
        }
        window.location.href = '/dashboard.html';
      }
    }

  </script>
</body>
</html>
